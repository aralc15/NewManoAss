<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="shortcut icon" href="../assets/img/favicon.ico" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise Inteligente</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/style.css">
    
    <link rel="stylesheet" href="../assets/css/analise.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>


<body class="dark-theme"> 

    
    <div class="container-analises">
        
        <header class="top-header">
            <a href="../index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
            <h2>Análise de IA 🧠</h2>
            <div style="width: 20px;"></div> 
        </header>

        <div class="analise-grid">
            
            <div class="chart-card">
                <h3>Evolução de Despesas</h3>
                <div style="position: relative; height: 300px; width: 100%; overflow: hidden;" class="canvas-container">
                    <canvas id="graficoEvolucao"></canvas>
                </div>
            </div>

            <div class="ai-card">
                <h3>
                    <i class="fas fa-magic"></i> Consultor Financeiro
                </h3>
                <button id="btnGerarAnalise" class="btn-ia">
                    Gerar Análise Profunda
                </button>
                <div id="resultadoIA" class="ia-resposta">
                    Clica no botão acima para que a Inteligência Artificial analise todo o teu histórico e crie um plano de ação para ti.
                </div>
            </div>

        </div>
    </div>

    <script type="module" src="../assets/js/script.js"></script>

</body>
</html>
