<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mano Projetos</title>
    <link rel="shortcut icon" href="../assets/img/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/projetos.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="dark-theme">

    <div class="container-projetos">
        
        <header class="top-header">
            <a href="../index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Voltar</a>
            <h2>Projetos e Metas 🚀</h2>
            <div style="width: 20px;"></div> 
        </header>

        <div class="summary-card">
            <h3>Total Guardado</h3>
            <h2 id="total-saved-amount">R$ 0,00</h2>
        </div>

        <div id="projetosLista" class="projetos-grid">
            <p style="text-align: center; color: #64748b; margin-top: 50px;">Carregando...</p>
        </div>

    </div>

    <button id="btnNovoProjeto" class="fab-add">
        <i class="fas fa-plus"></i>
    </button>

    <div id="modalProjeto" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Novo Projeto</h3>
                <span class="close-btn" id="closeProjeto">&times;</span>
            </div>
            <form id="formProjeto">
                <input type="hidden" id="projetoId">
                <div class="form-group">
                    <label>Nome da Meta</label>
                    <input type="text" id="projetoNome" placeholder="Ex: Viagem Europa" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Valor da Meta (R$)</label>
                        <input type="text" id="projetoValorMeta" class="mascara-moeda" placeholder="R$ 0,00" required>
                    </div>
                    <div class="form-group">
                        <label>Data Limite (Opcional)</label>
                        <input type="date" id="projetoDataLimite">
                    </div>
                </div>
                <button type="submit" class="btn-primary">Salvar Projeto</button>
            </form>
        </div>
    </div>

    <div id="modalTransacaoProjeto" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Movimentar Saldo</h3>
                <span class="close-btn" id="closeTransacaoProjeto">&times;</span>
            </div>
            <form id="formTransacaoProjeto">
                <input type="hidden" id="transacaoProjetoId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Ação</label>
                        <select id="transacaoAcao" required>
                            <option value="depositar">🟢 Depositar (+)</option>
                            <option value="sacar">🔴 Retirar (-)</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Valor (R$)</label>
                        <input type="text" id="transacaoValor" class="mascara-moeda" placeholder="R$ 0,00" required>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Confirmar</button>
            </form>
        </div>
    </div>

    <script type="module" src="../assets/js/script.js"></script>
</body>
</html>
